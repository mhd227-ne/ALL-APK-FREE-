<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galerie Privée</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:url('https://files.catbox.moe/n1x36o.jpg') no-repeat center center/cover;
min-height:100vh;
padding:20px;
color:white;
overflow-x:hidden;
}

.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
padding:20px;
border-radius:20px;
}

.container{
max-width:500px;
margin:auto;
background:rgba(15,23,42,0.85);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(0,255,255,0.3);
animation:glow 3s infinite alternate;
text-align:center;
}

@keyframes glow{
0%{
box-shadow:0 0 15px cyan;
}
100%{
box-shadow:0 0 35px #38bdf8;
}
}

h1{
font-size:32px;
margin-bottom:20px;
color:#38bdf8;
}

.lock-img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid #38bdf8;
margin-bottom:15px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
outline:none;
font-size:16px;
margin-top:10px;
background:#1e293b;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background:#38bdf8;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
opacity:0.8;
}

.gallery{
display:none;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

.gallery img{
width:100%;
border-radius:12px;
border:3px solid #38bdf8;
}

.error{
margin-top:10px;
color:red;
font-size:14px;
}

.footer{
margin-top:20px;
font-size:14px;
color:#cbd5e1;
}

</style>
</head>

<body>

<div class="overlay">

<div class="container">

<img
class="lock-img"
src="https://files.catbox.moe/395fl2.jpg"
>

<h1>🔒kawaki227 Galerie Privée</h1>

<input
type="password"
id="password"
placeholder="Entrer le code secret"
/>

<button onclick="checkPassword()">
🔓 Ouvrir Galerie
</button>

<div class="error" id="error"></div>

<div class="gallery" id="gallery"></div>

<div class="footer">
By kawaki227 <br>
+22781289418
</div>

</div>

</div>

<audio autoplay loop>
<source src="https://files.catbox.moe/tn0umt.mp3" type="audio/mpeg">
</audio>

<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl =
'https://zssozoksokhducilosjx.supabase.co'

const supabaseKey =
'sb_publishable_yizSkGPTjQUsQBdflQDjzw_0lwhtyi4'

const supabase =
createClient(
supabaseUrl,
supabaseKey
)

const gallery =
document.getElementById('gallery')

const SECRET_CODE =
'8128'

function checkPassword(){

const password =
document.getElementById('password').value

if(password === SECRET_CODE){

document.querySelector('input').style.display='none'

document.querySelector('button').style.display='none'

document.getElementById('error').style.display='none'

gallery.style.display='grid'

loadPhotos()

}else{

document.getElementById('error').innerHTML =
'❌ Mauvais code'

}

}

async function loadPhotos(){

gallery.innerHTML=''

const { data,error } =
await supabase
.storage
.from('photos')
.list('',{
limit:100
})

if(error){

return

}

data.reverse()

data.forEach(file=>{

const img =
document.createElement('img')

img.src =
`${supabaseUrl}/storage/v1/object/public/photos/${file.name}`

gallery.appendChild(img)

})

}

window.checkPassword = checkPassword

</script>

</body>
</html>
